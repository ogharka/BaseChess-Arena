<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaseChess Arena ♟️</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: 'Press Start 2P', system-ui;
      text-align: center;
      min-height: 100vh;
    }
    h1 {
      color: #00ff88;
      text-shadow: 0 0 20px #00ff88;
      margin: 20px;
      font-size: 2.2em;
    }
    .header {
      background: linear-gradient(#111, #000);
      padding: 15px;
      border-bottom: 4px solid #00ff88;
    }
    #board {
      width: 520px;
      height: 520px;
      margin: 20px auto;
      border: 12px solid #1a1a1a;
      border-radius: 8px;
      box-shadow: 0 0 40px #00ff88, inset 0 0 30px rgba(0,255,136,0.3);
    }
    button {
      background: #00ff88;
      color: #000;
      padding: 14px 32px;
      margin: 10px;
      border: none;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px #00ff88;
    }
    button:hover {
      background: #00ffcc;
      transform: scale(1.05);
    }
    .pot {
      font-size: 28px;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700;
      margin: 10px;
    }
    .status {
      font-size: 20px;
      min-height: 60px;
      color: #00ffcc;
      margin: 15px;
    }
    .info {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #111;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #00ff88;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>♟️ BaseChess Arena ♟️</h1>
    <p>PVP Chess on Coinbase Base • Real USDC Prizes</p>
  </div>

  <div class="info">
    <button onclick="connectWallet()">🔗 Connect Base Wallet</button>
    <div id="walletInfo" style="margin-top:12px; font-size:14px;"></div>
  </div>

  <div class="pot">🏆 Match Pot: <span id="pot">4.00</span> USDC</div>

  <button onclick="startMatch()">🎮 Start New Match (2 USDC Deposit)</button>

  <div class="status" id="status">Waiting for you to start...</div>

  <div id="board"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script>
    let chess = new Chess();
    let board = null;
    let gameActive = false;

    function connectWallet() {
      document.getElementById("walletInfo").innerHTML = `
        ✅ Connected on <strong>Base</strong><br>
        0x71C7...a3B9<br>
        <span style="color:#00ff88">USDC: 245.80</span>
      `;
      alert("✅ Wallet connected successfully on Coinbase Base!");
    }

    function startMatch() {
      if (!document.getElementById("walletInfo").innerHTML) {
        alert("Please connect your Base Wallet first!");
        return;
      }
      
      chess.reset();
      gameActive = true;
      document.getElementById("pot").textContent = "4.00";
      document.getElementById("status").innerHTML = "🎯 Match Started • You are <strong>White</strong>";

      const config = {
        draggable: true,
        position: 'start',
        onDrop: handleMove,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
        sparePieces: false
      };
      
      board = Chessboard('board', config);
      alert("💰 2 USDC successfully deposited on Base!\n\nPlay against AI (demo). Win = 90% prize!");
    }

    function handleMove(source, target) {
      if (!gameActive) return 'snapback';

      const move = chess.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';

      document.getElementById("status").textContent = "🤖 Opponent thinking...";

      setTimeout(() => {
        if (chess.game_over()) {
          endGame();
        } else {
          makeAIMove();
        }
      }, 700);
      return true;
    }

    function makeAIMove() {
      const moves = chess.moves();
      if (moves.length === 0) return;

      const randomMove = moves[Math.floor(Math.random() * moves.length)];
      chess.move(randomMove);
      board.position(chess.fen());

      if (chess.game_over()) {
        endGame();
      } else {
        document.getElementById("status").innerHTML = "Your Turn (White)";
      }
    }

    function endGame() {
      gameActive = false;
      if (chess.in_checkmate()) {
        document.getElementById("status").innerHTML = "🏆 CHECKMATE! YOU WIN!";
        alert("🎉 Congratulations!\n\n90% of pot (3.60 USDC) sent to your wallet!\n10% (0.40 USDC) to project pool for future token buyback.\n\nTx confirmed on Base! ♟️");
      } else {
        document.getElementById("status").textContent = "Game Over - Draw";
      }
    }
  </script>
</body>
</html>
