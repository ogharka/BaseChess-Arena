<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaseChess Arena ♟️</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
  <style>
    body { margin:0; background:#0a0a0a; color:#fff; font-family:Arial; text-align:center; }
    h1 { color:#00ff88; margin:20px; text-shadow: 0 0 15px #00ff88; }
    #board { width: 500px; height: 500px; margin: 20px auto; border: 10px solid #00ff88; border-radius: 12px; box-shadow: 0 0 30px #00ff88; }
    button { background:#00ff88; color:black; padding:16px 32px; margin:10px; border:none; border-radius:50px; font-size:18px; cursor:pointer; font-weight:bold; }
    button:hover { transform: scale(1.05); }
    .pot { font-size:24px; color:#ffd700; margin:10px; }
    .status { font-size:22px; margin:15px; min-height:30px; color:#00ffcc; }
  </style>
</head>
<body>
  <h1>♟️ BaseChess Arena ♟️</h1>
  <p style="color:#aaa;">PVP Chess on Base • Deposit USDC • Winner Takes 90%</p>

  <div style="position:absolute; top:20px; right:20px; background:#111; padding:15px; border-radius:12px;">
    <button onclick="connectWallet()">🔗 Connect Base Wallet</button>
    <div id="walletInfo" style="margin-top:10px; font-size:14px;"></div>
  </div>

  <div class="pot">Match Pot: <span id="pot">4.00</span> USDC</div>

  <div>
    <button onclick="startMatch()">🎮 Start New Match (2 USDC Deposit)</button>
  </div>

  <div class="status" id="status">Waiting for you to start...</div>

  <div id="board"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script>
    let chess = new Chess();
    let board = null;
    let gameActive = false;

    function connectWallet() {
      document.getElementById("walletInfo").innerHTML = `
        ✅ Connected on Base<br>
        Address: 0x71C7...a3B9<br>
        USDC: 245.80
      `;
      alert("✅ Wallet connected on Coinbase Base!");
    }

    function startMatch() {
      if (document.getElementById("walletInfo").innerHTML === "") {
        alert("Please connect Base Wallet first!");
        return;
      }
      
      chess.reset();
      gameActive = true;
      document.getElementById("pot").textContent = "4.00";
      document.getElementById("status").textContent = "Match Started • You are White";

      const config = {
        draggable: true,
        position: 'start',
        onDrop: handleMove,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
      };
      
      board = Chessboard('board', config);
      alert("💰 2 USDC deposited successfully on Base!\n\nPlay against AI opponent (demo). Win to claim prize!");
    }

    function handleMove(source, target) {
      if (!gameActive) return 'snapback';

      const move = chess.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      if (move === null) return 'snapback';

      document.getElementById("status").textContent = "Opponent thinking...";

      // AI move after 600ms
      setTimeout(aiMove, 600);
      return true;
    }

    function aiMove() {
      const moves = chess.moves();
      if (moves.length === 0) return;

      const randomMove = moves[Math.floor(Math.random() * moves.length)];
      chess.move(randomMove);
      board.position(chess.fen());

      if (chess.game_over()) {
        endGame();
      } else {
        document.getElementById("status").textContent = "Your Turn (White)";
      }
    }

    function endGame() {
      gameActive = false;
      if (chess.in_checkmate()) {
        document.getElementById("status").innerHTML = "🏆 CHECKMATE! You Win!";
        alert("🎉 You Won the Match!\n\n90% (1.80 USDC) sent to your wallet\n10% (0.20 USDC) sent to project pool for token buyback");
      } else {
        document.getElementById("status").textContent = "Game Over - Draw";
      }
    }
  </script>
</body>
</html>
